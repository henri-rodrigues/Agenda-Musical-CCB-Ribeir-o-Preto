<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEM - Sistema Musical CCB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-dark: #0f172a;
            --p-accent: #c5a059;
            --p-bg: #f8fafc;
            --p-text-light: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--p-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { font-family: 'Poppins'; color: var(--p-dark); margin-bottom: 10px; }
        p { color: var(--p-text-light); line-height: 1.6; margin-bottom: 25px; }
        .btn-back {
            display: inline-block;
            padding: 12px 25px;
            background: var(--p-dark);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-back:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🚧</div>
        <h1>GEM</h1>
        <p>A área do <b>Grupo de Estudos Musicais</b> está em desenvolvimento.<br>Em breve, teremos atualizações sobre métodos, escalas e cronogramas!</p>
        <a href="index.html" class="btn-back">Voltar para Agenda</a>
    </div>
</body>
</html>
